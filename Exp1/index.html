<!DOCTYPE html>
<html>
<head>

<title>CSS Types</title>

<link rel="stylesheet" href="style.css">

<style>

/* ================= BODY DESIGN ================= */

body{

    margin:0;

    font-family:'Segoe UI', Arial, sans-serif;

    /* Add your background image here */
    background-image:url("COLLEGE.jpg");

    background-size:cover;

    background-position:center;

    background-repeat:no-repeat;

    min-height:100vh;

}


/* Dark red overlay */

body::before{

    content:"";

    position:fixed;

    top:0;

    left:0;

    width:100%;

    height:100%;

    background:rgba(120,0,0,0.45);

    z-index:-1;

}


/* ================= FORM CARD ================= */


.container{

    width:420px;

    margin:70px auto;

    background:rgba(255,255,255,0.95);

    padding:35px;

    border-radius:18px;

    box-shadow:0 10px 30px rgba(0,0,0,0.35);

    border-top:8px solid #b71c1c;

}


/* College Heading */

h1{

    text-align:center;

    color:#b71c1c;

    font-size:28px;

    text-transform:uppercase;

    letter-spacing:1px;

    margin-bottom:30px;

}


/* Labels */

label{

    font-weight:600;

    color:#7f0000;

    font-size:16px;

}


/* Input Fields */


input{

    width:100%;

    padding:13px;

    margin-top:8px;

    margin-bottom:20px;

    border:2px solid #e0a0a0;

    border-radius:8px;

    font-size:15px;

    box-sizing:border-box;

    transition:0.3s;

}


input:focus{

    outline:none;

    border-color:#b71c1c;

    box-shadow:0 0 8px rgba(183,28,28,0.4);

}


/* Button */


button{

    width:100%;

    padding:14px;

    background:linear-gradient(45deg,#b71c1c,#f44336);

    color:white;

    border:none;

    border-radius:8px;

    font-size:17px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;

}


button:hover{

    transform:scale(1.04);

    background:linear-gradient(45deg,#7f0000,#d32f2f);

}



</style>

</head>
